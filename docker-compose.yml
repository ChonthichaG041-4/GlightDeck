version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: glightdeck-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: glightdeck
      POSTGRES_PASSWORD: glightdeck
      POSTGRES_DB: glightdeck
    ports:
      - "5432:5432"
    volumes:
      - glightdeck_pgdata:/var/lib/postgresql/data

volumes:
  glightdeck_pgdata:
