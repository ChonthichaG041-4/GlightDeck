version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lingodeck-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lingodeck
      POSTGRES_PASSWORD: lingodeck
      POSTGRES_DB: lingodeck
    ports:
      - "5432:5432"
    volumes:
      - lingodeck_pgdata:/var/lib/postgresql/data

volumes:
  lingodeck_pgdata:
